name: fitness-premium-hub

services:
  mongodb:
    image: mongo:latest
    container_name: fitness_hub_mongo
    restart: always
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: securepassword
      MONGO_INITDB_DATABASE: fitness_hub
    volumes:
      - mongodb_data:/data/db
    networks:
      - fitness_network

  mongo-express:
    image: mongo-express:latest
    container_name: fitness_hub_mongo_ui
    restart: always
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: securepassword
      ME_CONFIG_MONGODB_URL: mongodb://admin:securepassword@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: securepassword
    depends_on:
      - mongodb
    networks:
      - fitness_network

networks:
  fitness_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
